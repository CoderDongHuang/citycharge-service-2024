server:
  port: 8080

spring:
  application:
    name: citycharge-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/citycharge?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  sql:
    init:
      mode: never
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  web:
    resources:
      static-locations: classpath:/static/

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

avatar:
  upload:
    path: ${user.home}/citycharge-uploads/avatars

station:
  upload:
    path: ${user.home}/citycharge-uploads/stations

# 自定义配置
citycharge:
  map:
    width: 100
    height: 100
    file-path: classpath:map/map.txt
  
  battery:
    min-voltage: 3.0
    max-voltage: 4.2
    
  alarm:
    low-battery-threshold: 0.2
    high-temperature-threshold: 60
    low-temperature-threshold: 0
    
  notification:
    charging-station-threshold: 0.3

# JWT配置
jwt:
  secret: ${JWT_SECRET:citycharge-secret-key-for-jwt-token-generation-2024}
  expiration: 86400000

# GitHub OAuth 配置 - 使用环境变量
github:
  oauth:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/auth/github/callback}
    frontend-redirect: ${FRONTEND_REDIRECT:http://localhost:5173/dashboard}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  max-tokens: ${DEEPSEEK_MAX_TOKENS:2000}
  temperature: ${DEEPSEEK_TEMPERATURE:0.7}

# 日志配置
logging:
  level:
    com.citycharge: DEBUG
    org.springframework.web: INFO
  file:
    name: logs/citycharge-service.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Swagger配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  paths-to-match:
    - /api/**
